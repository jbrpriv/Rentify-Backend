name: Backend CI/CD

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main]

jobs:
  # ─── Lint & Unit Tests ────────────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    env:
      NODE_ENV: test
      MONGO_URI: mongodb://localhost:27017/rentifypro_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Run unit & integration tests
        run: npm test -- --forceExit --detectOpenHandles

  # ─── Deploy to Staging ────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy → Staging (EC2)
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/staging'

    steps:
      - name: Deploy to staging EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.STAGING_EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key:      ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/app
            git pull origin staging
            docker compose up -d --build
            docker image prune -f
            pm2 restart stripe-billing
            pm2 restart stripe-payments

  # ─── Deploy to Production ─────────────────────────────────────────────────
  deploy-production:
    name: Deploy → Production (EC2)
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Deploy to production EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.PROD_EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key:      ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/Rentify-Backend
            git pull origin main
            docker-compose down
            docker-compose up -d --build
            docker image prune -f
            pm2 restart stripe-billing
            pm2 restart stripe-payments

      - name: Validate production health
        env:
          HEALTH_URL: ${{ secrets.PROD_HEALTH_URL }}
        run: |
          echo "Polling production health at $HEALTH_URL ..."
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$HEALTH_URL/api/health" || echo "000")
            echo "Attempt $i/30 — HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "✅ Production is healthy"
              exit 0
            fi
            sleep 10
          done
          echo "❌ Health checks failed after 5 minutes"
          exit 1