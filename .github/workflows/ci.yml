name: Backend CI/CD

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main]

jobs:
  # ─── Lint & Unit Tests ────────────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    env:
      NODE_ENV: test
      MONGO_URI: mongodb://localhost:27017/rentifypro_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Run unit & integration tests
        run: npm test -- --forceExit --detectOpenHandles

  # ─── Deploy to Staging (ECS) ─────────────────────────────────────────────
  deploy-staging:
    name: Deploy → Staging
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/staging'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/rentifypro-backend:$IMAGE_TAG .
          docker push $ECR_REGISTRY/rentifypro-backend:$IMAGE_TAG
          echo "IMAGE=$ECR_REGISTRY/rentifypro-backend:$IMAGE_TAG" >> $GITHUB_ENV

      - name: Deploy to ECS (Staging)
        run: |
          aws ecs update-service \
            --cluster rentifypro-staging \
            --service rentifypro-backend \
            --force-new-deployment

  # ─── Canary Deploy to Production ─────────────────────────────────────────
  deploy-production:
    name: Deploy → Production (Canary)
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/rentifypro-backend:$IMAGE_TAG .
          docker push $ECR_REGISTRY/rentifypro-backend:$IMAGE_TAG

      - name: Canary deploy (10% traffic)
        run: |
          aws ecs update-service \
            --cluster rentifypro-production \
            --service rentifypro-backend-canary \
            --force-new-deployment

      - name: Wait & validate canary (5 min)
        run: sleep 300

      - name: Promote canary to full production
        run: |
          aws ecs update-service \
            --cluster rentifypro-production \
            --service rentifypro-backend \
            --force-new-deployment